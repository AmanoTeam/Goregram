
def getVersionName = {
    return APP_VERSION_NAME
}

def getVersionCode = {
    return APP_VERSION_CODE
}

def isFdroid = {
    return ((F_DROID.toInteger() == 1) as Boolean)
}

ext {
    Utils = [:]
    Utils['getVersionName'] = getVersionName
    Utils['getVersionCode'] = getVersionCode
    Utils['isFdroid'] = isFdroid
}
